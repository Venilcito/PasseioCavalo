<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Passeio do Cavalo</title>
    <style>
        body{
            margin: 0;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
        }

        .container{
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            margin-top: 40px;
        }

        .lado-esquerdo{
            width: 360px;
            min-height: 400px;
            padding: 20px;
            border: 2px solid #444;
            border-radius: 8px;
        }

        .centro{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas{
            border: 4px solid #444;
            cursor: pointer;
        }

        #controles{
            margin-top: 20px;
        }

        #controles button{
            width: 180px;
            height: 60px;
            font-size: 20px;
            margin: 0 10px;
            cursor: pointer;
        }

        #reset{
            margin-top: 20px;
        }

        #reset button{
            width: 180px;
            height: 60px;
            font-size: 20px;
            margin: 0 10px;
            cursor: pointer;
        }

        .lado-direito{
            width: 360px;
            min-height: 400px;
            padding: 20px;
            border: 2px solid #444;
            border-radius: 8px;
        }

        h2{
            background-color: white;
            color: black;
            width: 200px;
            height: 65px;
            font-size: 30px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Cada linha das métricas */
        .linha{
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .linha p{
            margin: 0;
            width: 190px;
            height: 55px;
            padding: 5px 10px;

            background-color: white;
            color: black;

            display: flex;
            align-items: center;

            font-size: 22px;
            font-weight: bold;
        }

        .linha span{
            margin-left: 10px;
            width: 100px;
            height: 55px;
            padding: 5px;

            background-color: white;
            color: black;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 22px;
            font-weight: bold;
        }

        .limite {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .limite input {
            width: 120px;
            height: 35px;
            font-size: 20px;
            text-align: center;
            border: 2px solid #444;
            border-radius: 4px;
            background-color: white;
            color: black;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="lado-esquerdo">
            <h2>Passeio</h2>
            <div style="background-color: white; color: black; padding: 15px; border-radius: 4px;">
                <h3 style="margin-top: 0; margin-bottom: 10px; border-bottom: 2px solid #222; padding-bottom: 5px;">Caminho Percorrido:</h3>
                
                <ol id="lista-caminho" style="max-height: 300px; overflow-y: auto; font-size: 18px; padding-left: 25px; margin: 0; text-align: left;">
                    <li style="color: #666; font-style: italic; list-style-type: none; margin-left: -20px;">Nenhuma casa selecionada</li>
                </ol>
            </div>
        </div>

        <div class="centro">
            <canvas id="tabuleiro" width="400" height="400"></canvas>

            <div id="controles">
                <button id="btn-dfs" disabled>Rodar DFS</button>
                <button id="btn-a" disabled>Rodar IDA*</button>

                <div class="limite">
                    <label for="input-tempo">Tempo máximo (segundos):</label>
                    <input type="number" id="input-tempo" step="1" value="100">
                </div>
            </div>

            <div id="reset">
                <button id="btn-reset" disabled>Reset</button>
            </div>
        </div>

        <div class="lado-direito">
            <h2>Métricas</h2>

            <div class="linha">
                <p>Algoritmo:</p>
                <span id="algoritmo">-</span>
            </div>

            <div class="linha">
                <p>Nós gerados:</p>
                <span id="gerados">0</span>
            </div>

            <div class="linha">
                <p>Nós expandidos:</p>
                <span id="expandidos">0</span>
            </div>

            <div class="linha">
                <p>Tempo:</p>
                <span id="tempo">0</span>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>

</body>
</html>
